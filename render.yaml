services:
  # PostgreSQL Database
  - type: pgsql
    name: hotel-booking-db
    plan: free
    databaseName: hotel_booking
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  # Web Service
  - type: web
    name: hotel-booking-api
    runtime: php
    plan: free
    buildCommand: |
      curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      composer install --no-interaction --optimize-autoloader --no-dev
    startCommand: |
      php artisan migrate --force
      php artisan db:seed --force
      php artisan serve --host=0.0.0.0 --port=10000
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          name: hotel-booking-api
          type: web
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-booking-db
          property: connectionString
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
    healthCheckPath: /api/test-availability
    autoDeploy: true